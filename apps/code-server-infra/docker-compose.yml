version: '3.8'

services:
  traefik:
    image: traefik:v2.10
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "8080:80"
      - "8081:8080" # Dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - hermes-ide-net

  code-server-rio:
    image: lscr.io/linuxserver/code-server:latest
    container_name: hermes-ide-rio
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Jakarta
      - PASSWORD=secret # To be changed to Hermes Auth Portal
      - SUDO_PASSWORD=secret
    volumes:
      - ./workspace-rio:/config/workspace
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.coderio.rule=Host(`rio.hermes-ide.local`)"
      - "traefik.http.routers.coderio.entrypoints=web"
      - "traefik.http.services.coderio.loadbalancer.server.port=8443"
    networks:
      - hermes-ide-net

networks:
  hermes-ide-net:
    driver: bridge