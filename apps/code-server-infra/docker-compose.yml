version: '3.8'

services:
  code-server-rio:
    image: lscr.io/linuxserver/code-server:latest
    container_name: hermes-ide-rio
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Jakarta
      - PASSWORD=secret # To be changed to Hermes Auth Portal
      - SUDO_PASSWORD=secret
    volumes:
      - ./workspace-rio:/config/workspace
    ports:
      - "51001:8443"
    networks:
      - hermes-ide-net

  code-server-default:
    image: lscr.io/linuxserver/code-server:latest
    container_name: hermes-ide-default
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Jakarta
      - PASSWORD=secret
      - SUDO_PASSWORD=secret
    volumes:
      - ./workspace-default:/config/workspace
    ports:
      - "51002:8443"
    networks:
      - hermes-ide-net

networks:
  hermes-ide-net:
    driver: bridge